<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>madprocs</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.2.1/ansi_up.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Head -->
                    <circle cx="32" cy="32" r="28" fill="#7c3aed"/>
                    <!-- Angry eyebrows -->
                    <line x1="14" y1="20" x2="26" y2="26" stroke="#f0f0f5" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="50" y1="20" x2="38" y2="26" stroke="#f0f0f5" stroke-width="3.5" stroke-linecap="round"/>
                    <!-- Eyes - furious dots -->
                    <circle cx="22" cy="30" r="3.5" fill="#f0f0f5"/>
                    <circle cx="42" cy="30" r="3.5" fill="#f0f0f5"/>
                    <!-- Mouth - jagged angry yell -->
                    <polyline points="18,44 23,40 28,46 32,38 36,46 41,40 46,44" stroke="#f0f0f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <!-- Steam puffs -->
                    <circle cx="8" cy="12" r="3" fill="#f87171" opacity="0.7"/>
                    <circle cx="4" cy="6" r="2" fill="#f87171" opacity="0.5"/>
                    <circle cx="56" cy="12" r="3" fill="#f87171" opacity="0.7"/>
                    <circle cx="60" cy="6" r="2" fill="#f87171" opacity="0.5"/>
                </svg>
                <h1>madprocs</h1>
                <span class="version">process manager</span>
            </div>
            <span class="status" id="connection-status">
                <span class="status-dot"></span>
                Connecting...
            </span>
        </header>

        <div class="main">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Processes</span>
                </div>
                <ul id="process-list"></ul>
            </aside>

            <main class="content">
                <div class="log-header">
                    <div class="log-header-left">
                        <h2 id="log-title">Select a process</h2>
                        <span class="log-badge" id="log-stats">0 lines</span>
                        <span class="log-badge search-badge" id="search-stats"></span>
                    </div>
                    <div class="controls">
                        <div class="search-wrapper">
                            <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
                            <input type="text" id="search-input" placeholder="Search logs... ( / )" />
                        </div>
                        <div class="btn-group">
                            <button id="btn-start" class="btn btn-success" disabled title="Start process">
                                <svg viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
                            </button>
                            <button id="btn-stop" class="btn btn-danger" disabled title="Stop process">
                                <svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="1"/></svg>
                            </button>
                            <button id="btn-restart" class="btn" disabled title="Restart process">
                                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 1 1 .908-.418A6 6 0 1 1 8 2v1z"/><path d="M8 1.5l2.5 2L8 5.5V1.5z"/></svg>
                            </button>
                        </div>
                        <div class="btn-group">
                            <button id="btn-copy" class="btn" title="Copy all logs">
                                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>
                            </button>
                            <button id="btn-download" class="btn" title="Download logs">
                                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                            </button>
                            <button id="btn-clear" class="btn" title="Clear logs">
                                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="log-viewer" id="log-viewer">
                    <div class="log-content" id="log-content"></div>
                </div>
            </main>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
